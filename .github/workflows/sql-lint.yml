name: SQL Lint

on:
  push:
    branches: [ master ]
    paths:
      - 'databaseProject/**/*.sql'
      - '.github/workflows/sql-lint.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'databaseProject/**/*.sql'
      - '.github/workflows/sql-lint.yml'

jobs:
  sql-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install sqlfluff
        run: pip install sqlfluff
      - name: Lint SQL files
        run: sqlfluff lint databaseProject/**/*.sql --dialect postgres

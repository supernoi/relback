name: Docker Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t relback:ci .
          else
            echo "Dockerfile not found at repository root. Skipping."
          fi

name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  check-and-test:
    name: Sensor Gate — check + domain tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check (Sensor Gate 1)
        env:
          DJANGO_SETTINGS_MODULE: projectRelback.settings_dev
        run: python manage.py check

      - name: Domain unit tests — no DB required (Sensor Gate 2)
        env:
          DJANGO_SETTINGS_MODULE: projectRelback.settings_dev
        run: python -m unittest coreRelback.tests_domain -v

      - name: Integration tests — views + auth (Sensor Gate 3)
        env:
          DJANGO_SETTINGS_MODULE: projectRelback.settings_test
        run: python manage.py test coreRelback.tests --verbosity=2

  sql-lint:
    name: SQL Syntax Validation (Oracle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL scripts in databaseProject/
        # Config and exclusions are read from .sqlfluff and .sqlfluffignore at repo root.
        # Oracle PL/SQL files are excluded via .sqlfluffignore; see that file for rationale.
        run: sqlfluff lint databaseProject/

  template-lint:
    name: Django Template Lint (djlint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install djlint
        run: pip install "djlint>=1.36.0,<2.0"

      - name: Lint Django templates
        # Config is read from .djlintrc at repo root.
        # Enforces T003 (named endblocks) to prevent formatter-collapse regressions.
        run: djlint coreRelback/templates/ --lint

  tailwind-build:
    name: Tailwind CSS Build Sensor (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: theme/static_src/package-lock.json

      - name: Install npm dependencies
        working-directory: theme/static_src
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: theme/static_src
        run: |
          mkdir -p ../static/css/dist
          npm run build

      - name: Verify compiled CSS is non-placeholder (> 1 KB)
        run: |
          CSS_PATH="theme/static/css/dist/styles.css"
          CSS_SIZE=$(wc -c < "$CSS_PATH")
          echo "Compiled CSS size: ${CSS_SIZE} bytes"
          if [ "$CSS_SIZE" -lt 1024 ]; then
            echo "ERROR: styles.css is ${CSS_SIZE} bytes — looks like a placeholder or empty build."
            exit 1
          fi
          echo "✅ CSS build valid (${CSS_SIZE} bytes)"

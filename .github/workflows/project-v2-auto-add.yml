name: Project V2 Auto Add

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    env:
      PROJECTS_AUTOMATION_TOKEN: ${{ secrets.PROJECTS_AUTOMATION_TOKEN }}
    steps:
      - name: Skip gracefully when token is missing
        if: ${{ env.PROJECTS_AUTOMATION_TOKEN == '' }}
        run: echo "PROJECTS_AUTOMATION_TOKEN is not configured; skipping project auto-add."

      - name: Add item to Project #3
        if: ${{ env.PROJECTS_AUTOMATION_TOKEN != '' }}
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/supernoi/projects/3
          github-token: ${{ env.PROJECTS_AUTOMATION_TOKEN }}
